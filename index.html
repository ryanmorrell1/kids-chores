<head>

<title>Homebase — Family Chore Tracker</title>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyA4cNvHe5vSQr6MqvH-SHNIX4cpRbXVqcc",
    authDomain:        "kids-chores-74ff9.firebaseapp.com",
    projectId:         "kids-chores-74ff9",
    storageBucket:     "kids-chores-74ff9.firebasestorage.app",
    messagingSenderId: "789602359442",
    appId:             "1:789602359442:web:690015ae59fb1eeb066e4b"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // Firestore document paths (one doc per kid per week; week starts MONDAY, auto-resets Monday)
  // /homebase/a_YYYY-MM-DD  → Addison's week (Monday's date). Holds weekly `done` + per-date `daily` maps.
  // /homebase/b_YYYY-MM-DD  → Bryson's week
  // /homebase/meta          → alert dismissed flag + persistent one-time project claims
  // /homebase/chores        → editable chore list (seeded from CHORES_SEED; edited via Master tab)

  window._db = db;
  window._doc = doc;
  window._setDoc = setDoc;
  window._getDoc = getDoc;
  window._onSnapshot = onSnapshot;
  window._serverTimestamp = serverTimestamp;
  window._firebaseReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
  :root {
    --bg:#F7F6F2; --surface:#FFFFFF; --surface2:#F0EEE9;
    --border:#E2DFD8; --border2:#C8C4BA;
    --text:#1A1916; --text2:#6B6860; --text3:#9E9B94;
    --purple-bg:#EEEDFE; --purple-mid:#7F77DD; --purple-dark:#3C3489; --purple-border:#AFA9EC;
    --teal-bg:#E1F5EE; --teal-mid:#1D9E75; --teal-dark:#085041; --teal-border:#5DCAA5;
    --amber-bg:#FAEEDA; --amber-dark:#633806;
    --coral-bg:#FAECE7; --coral-dark:#712B13;
    --gray-bg:#F1EFE8; --gray-dark:#5F5E5A;
    --green-bg:#EAF3DE; --green-dark:#27500A;
    --red-bg:#FCEBEB; --red-dark:#791F1F; --red-border:#F09595;
    --radius:10px; --radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:15px;}

  /* NAV */
  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
  .nav-logo{font-size:16px;font-weight:600;padding:1rem 1rem 1rem 0;border-right:1px solid var(--border);margin-right:1rem;white-space:nowrap;}
  .nav-logo span{color:var(--purple-mid);}
  .nav-tabs{display:flex;flex:1;overflow-x:auto;}
  .nav-tab{padding:1rem 1.1rem;font-size:14px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;}
  .nav-tab:hover{color:var(--text);}
  .nav-tab.act-a{color:var(--purple-dark);border-bottom-color:var(--purple-mid);}
  .nav-tab.act-b{color:var(--teal-dark);border-bottom-color:var(--teal-mid);}
  .nav-tab.act-p{color:var(--text);border-bottom-color:var(--text);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#9E9B94;margin-left:auto;flex-shrink:0;transition:background .3s;}
  .sync-dot.live{background:#1D9E75;}
  .sync-dot.err{background:#E24B4A;}

  /* ALERT */
  .alert-bar{background:var(--amber-bg);border-bottom:1px solid #FAC775;padding:10px 1.5rem;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--amber-dark);}
  .alert-bar.hidden{display:none;}
  .alert-bar strong{font-weight:600;}
  .alert-dismiss{margin-left:auto;background:none;border:none;color:var(--amber-dark);cursor:pointer;font-size:18px;line-height:1;opacity:.6;}
  .alert-dismiss:hover{opacity:1;}

  /* OFFLINE BANNER */
  .offline-bar{background:var(--red-bg);border-bottom:1px solid var(--red-border);padding:8px 1.5rem;font-size:13px;color:var(--red-dark);display:none;align-items:center;gap:8px;}
  .offline-bar.show{display:flex;}

  /* LOADING */
  .loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;color:var(--text3);font-size:14px;}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--purple-mid);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* MAIN */
  .main{max-width:800px;margin:0 auto;padding:1.5rem;}

  /* SUMMARY */
  .summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.5rem;}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center;}
  .s-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .s-value{font-size:26px;font-weight:600;}
  .s-sub{font-size:11px;color:var(--text3);margin-top:4px;}
  .val-purple{color:var(--purple-dark);}
  .val-teal{color:var(--teal-dark);}

  /* PROGRESS */
  .prog-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;}
  .prog-labels{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:8px;}
  .prog-track{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:99px;transition:width .4s ease;}
  .pf-a{background:var(--purple-mid);}
  .pf-b{background:var(--teal-mid);}

  /* SECTION */
  .section{margin-bottom:1.5rem;}
  .sec-head{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}

  /* CHORE ROW */
  .chore-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);margin-bottom:5px;cursor:pointer;transition:background .1s,border-color .1s;user-select:none;}
  .chore-row:hover{background:var(--surface2);border-color:var(--border2);}
  .chore-row.done{opacity:.42;}
  .chore-row.done .c-name{text-decoration:line-through;color:var(--text3);}
  .c-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .c-check svg{display:none;}
  .chore-row.done .c-check svg{display:block;}
  .chk-a{background:var(--purple-mid);border-color:var(--purple-mid);}
  .chk-b{background:var(--teal-mid);border-color:var(--teal-mid);}
  .c-name{flex:1;font-size:14px;color:var(--text);line-height:1.4;}
  .c-freq{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0;}
  .badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap;margin-left:5px;vertical-align:middle;}
  .b-shared{background:var(--gray-bg);color:var(--gray-dark);}
  .b-a{background:var(--purple-bg);color:var(--purple-dark);}
  .b-b{background:var(--teal-bg);color:var(--teal-dark);}
  .b-school{background:var(--amber-bg);color:var(--amber-dark);}
  .b-onetime{background:var(--coral-bg);color:var(--coral-dark);}
  .b-must{background:var(--red-bg);color:var(--red-dark);}

  /* EXTRA ROW */
  .extra-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);margin-bottom:5px;cursor:pointer;transition:background .1s;user-select:none;}
  .extra-row:hover{background:var(--surface2);}
  .extra-row.done{opacity:.42;}
  .extra-row.done .c-name{text-decoration:line-through;color:var(--text3);}
  .e-amt{font-size:13px;font-weight:600;flex-shrink:0;}
  .ea-a{color:var(--purple-dark);}
  .ea-b{color:var(--teal-dark);}

  /* GRADE CARD */
  .grade-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:5px;}
  .grade-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .grade-title{font-size:14px;font-weight:500;}
  .grade-sub{font-size:12px;color:var(--text3);}
  .grade-tiers{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;}
  .g-tier{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;}
  .g-tier.floor{background:var(--surface2);cursor:default;}
  .g-tier:not(.floor):hover{border-color:var(--border2);background:var(--surface2);}
  .g-tier.sel-a{background:var(--purple-bg);border-color:var(--purple-border);}
  .g-tier.sel-b{background:var(--teal-bg);border-color:var(--teal-border);}
  .g-gpa{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px;}
  .floor .g-gpa{color:var(--text2);}
  .g-amt{font-size:12px;color:var(--text2);}
  .g-amt.sel-a{color:var(--purple-dark);font-weight:600;}
  .g-amt.sel-b{color:var(--teal-dark);font-weight:600;}

  /* PARENT */
  .p-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
  .p-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .p-card-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
  .p-card-name{font-size:16px;font-weight:600;margin-bottom:2px;}
  .p-card-name.purple{color:var(--purple-dark);}
  .p-card-name.teal{color:var(--teal-dark);}
  .p-card-sub{font-size:12px;color:var(--text3);}
  .p-card-body{padding:1rem 1.25rem;}
  .p-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .p-row:last-child{border-bottom:none;}
  .p-row .pl{color:var(--text2);}
  .p-row .pv{font-weight:600;color:var(--text);}
  .pv.good{color:var(--green-dark);}
  .pv.warn{color:var(--amber-dark);}
  .pv.purple{color:var(--purple-dark);}
  .pv.teal{color:var(--teal-dark);}
  .mini-prog{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:10px;}
  .mini-fill{height:100%;border-radius:99px;}

  .p-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem;}
  .p-summary h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;}
  .e-list .e-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);}
  .e-list .e-item:last-child{border-bottom:none;}
  .e-item .eamt{font-weight:600;color:var(--text);}
  .no-extras{font-size:13px;color:var(--text3);font-style:italic;}

  /* DAILY GRID (parent report) */
  .p-summary h3.purple{color:var(--purple-dark);}
  .p-summary h3.teal{color:var(--teal-dark);}
  .daygrid-scroll{overflow-x:auto;}
  .daygrid{width:100%;border-collapse:collapse;font-size:12px;}
  .daygrid th{font-size:10px;color:var(--text3);font-weight:600;text-align:center;padding:4px 3px;text-transform:uppercase;letter-spacing:.03em;}
  .daygrid th.cname{text-align:left;}
  .daygrid td{text-align:center;padding:6px 3px;border-top:1px solid var(--border);white-space:nowrap;}
  .daygrid td.cname{text-align:left;color:var(--text2);max-width:150px;overflow:hidden;text-overflow:ellipsis;}
  .daygrid .cell-done{color:var(--green-dark);font-weight:700;}
  .daygrid .cell-miss{color:var(--text3);}
  .daygrid .ctot{font-weight:600;color:var(--text);}
  .daygrid th.today,.daygrid td.today{background:var(--surface2);}
  .daygrid tr.dg-total td{border-top:1.5px solid var(--border2);font-weight:600;color:var(--text2);}

  .payout-bar{background:var(--green-bg);border:1px solid #97C459;border-radius:var(--radius);padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
  .payout-bar .pt-label{font-size:14px;font-weight:500;color:var(--green-dark);}
  .payout-bar .pt-val{font-size:24px;font-weight:700;color:var(--green-dark);}

  .divider{height:1px;background:var(--border);margin:1.5rem 0;}

  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}
  .btn{padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:all .15s;}
  .btn:hover{background:var(--surface2);}
  .btn-danger{border-color:var(--red-border);color:var(--red-dark);background:var(--red-bg);}
  .btn-danger:hover{background:#F7C1C1;}
  .btn-notif{border-color:var(--purple-border);color:var(--purple-dark);background:var(--purple-bg);}
  .btn-notif:hover{background:#CECBF6;}

  .last-sync{font-size:11px;color:var(--text3);margin-top:1rem;text-align:center;}

  /* CHORE EDIT FORM (Master tab) */
  .cf-lbl{font-size:12px;color:var(--text2);}
  .cf-in{width:100%;padding:7px;border:1px solid var(--border2);border-radius:6px;font-size:14px;background:var(--surface);color:var(--text);margin-top:3px;}

  @media(max-width:600px){
    .p-grid{grid-template-columns:1fr;}
    .grade-tiers{grid-template-columns:repeat(2,1fr);}
    .main{padding:1rem;}
    .nav-logo{font-size:14px;}
  }
</style>
</head>

<nav class="nav">

<script>
// ─── DATA DEFINITIONS ─────────────────────────────────────────────────────────

const KIDS = {
  a: { name:'Addison', age:16, allowance:25 },
  b: { name:'Bryson',  age:14, allowance:20 }
};

// One flat, editable chore list. Each chore is explicitly categorized.
//   person : 'a' (Addison) | 'b' (Bryson) | 'both'
//   cat    : 'daily' | 'scheduled' | 'weekly' | 'biweekly' | 'nonneg'
//   days   : [0..6] (0=Sun..6=Sat) — required for 'scheduled', optional for 'biweekly'
//   parity : 0|1 — biweekly only; which alternating week is active (see weekIndex())
//   school : true — optional; shows the "school year" badge
//   freq   : human-readable recurrence label (auto-derived in edit mode, editable)
// This array SEEDS Firestore homebase/chores on first load; after that the live list
// comes from Firestore (state.chores) and is editable from the Master List tab.
const CHORES_SEED = [
  {id:'c1', text:'Make bed',                                   person:'both', cat:'daily', freq:'Daily'},
  {id:'c2', text:'Personal hygiene routine',                   person:'both', cat:'daily', freq:'Daily'},
  {id:'c3', text:'Prayers & devotionals',                      person:'both', cat:'daily', freq:'Daily'},
  {id:'c4', text:'Complete schoolwork',                        person:'both', cat:'daily', school:true, freq:'Daily (school year)'},
  {id:'c5', text:'Walk Bo',                                    person:'both', cat:'daily', freq:'Daily'},
  {id:'c6', text:'Help with family meals (cooking + cleanup)', person:'both', cat:'daily', freq:'Daily'},
  {id:'c7', text:'Vacuum main floor',                          person:'a',    cat:'daily', freq:'Daily'},
  {id:'c8', text:'Exercise / practice / game / match',         person:'both', cat:'daily', freq:'Daily'},
  {id:'c9', text:'Prepare backpack & water bottle',            person:'both', cat:'scheduled', days:[0,1,2,3,4], school:true, freq:'Sun–Thu evenings (school year)'},
  {id:'c10',text:'Own laundry (wash, dry, put away)',          person:'both', cat:'scheduled', days:[3,6], freq:'Wed & Sat'},
  {id:'c11',text:'Sheets & towels',                            person:'both', cat:'scheduled', days:[6], freq:'Every Saturday'},
  {id:'c12',text:'Gather all household trash + put cans out',  person:'b',    cat:'scheduled', days:[0,3], freq:'Sun night & Wed night'},
  {id:'c13',text:'Bring trash cans in from street',            person:'b',    cat:'scheduled', days:[1,4], freq:'Mon morning & Thu morning'},
  {id:'c14',text:'Full bedroom clean',                         person:'both', cat:'biweekly', parity:0, freq:'Every other Sat or Sun'},
  {id:'c15',text:'Full bathroom clean',                        person:'both', cat:'biweekly', parity:0, days:[6], freq:'Every other Sat morning'},
  {id:'c16',text:'Grocery run',                                person:'a',    cat:'weekly', freq:'2x/week'},
  {id:'c17',text:'Youth group',                                person:'both', cat:'nonneg', freq:'Weekly'},
  {id:'c18',text:'Community volunteer hours (30 hrs min)',     person:'both', cat:'nonneg', freq:'Yearly'},
];

const EXTRAS_SHARED = [
  {id:'xs1',text:'Vacuum basement, upstairs & stairs',                   amt:15, cat:'house'},
  {id:'xs2',text:'Steam clean hardwood + vacuum area rugs (main floor)', amt:10, cat:'house'},
  {id:'xs3',text:'Wash & vacuum car',                                    amt:15, cat:'house'},
  {id:'xs4',text:'Blowout garage, front walk & driveway',               amt:10, cat:'house'},
  {id:'xs5',text:'Read a book (200+ pages)',                             amt:10, cat:'learning'},
  {id:'xs6',text:'Complete a Khan Academy course',                       amt:25, cat:'learning'},
  {id:'xs7',text:'Complete 2 Duolingo levels',                          amt:10, cat:'learning'},
];
const EXTRAS_A = [
  {id:'xa1',text:'Deep clean kitchen (appliances, cabinets, counters)',  amt:12, cat:'house'},
  {id:'xa2',text:'Organize pantry or a closet',                          amt:10, cat:'house'},
  {id:'xa3',text:'Deep clean fridge & freezer',                          amt:10, cat:'house'},
  {id:'xa4',text:'Wash windows inside',                                  amt:10, cat:'house'},
  {id:'xa5',text:'Prep & cook a full family meal solo',                  amt:15, cat:'house'},
];
const EXTRAS_B = [
  {id:'xb1',text:'Mow & edge lawn',                                      amt:20, cat:'house'},
  {id:'xb2',text:'Rake leaves',                                          amt:12, cat:'house'},
  {id:'xb3',text:'Weed garden beds',                                     amt:10, cat:'house'},
  {id:'xb4',text:'Clean out garage (sweep & organize)',                  amt:15, cat:'house'},
  {id:'xb5',text:'Shovel driveway/walkways',                             amt:15, cat:'house'},
  {id:'xb6',text:'Wash windows outside',                                 amt:10, cat:'house'},
];
const PROJECTS = [
  {id:'xp1',text:'Move firewood to other side of yard',                  amt:20},
];

const GRADE_TIERS = [
  {gpa:'3.5',  label:'3.5',  amt:0,   floor:true},
  {gpa:'3.75', label:'3.75', amt:50},
  {gpa:'4.0',  label:'4.0',  amt:75},
  {gpa:'4.5',  label:'4.5+', amt:100},
];

function extrasFor(t){ return [...EXTRAS_SHARED, ...(t==='a'?EXTRAS_A:EXTRAS_B)]; }

// ─── STATE ────────────────────────────────────────────────────────────────────

// Escape user-editable text before interpolating into innerHTML. Chores are now editable + stored
// in Firestore, so chore text/freq are untrusted input — must be escaped to prevent stored XSS.
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Chore ids are always machine-generated (newChoreId / seed). Enforce a safe charset so a
// tampered Firestore doc can't inject an id that breaks out of the inline onclick handlers.
function validChoreId(id){ return typeof id==='string' && /^[A-Za-z0-9_-]+$/.test(id); }

// Local YYYY-MM-DD — avoids the UTC-rollover bug where an evening check (Eastern) lands on tomorrow.
function localDateStr(d=new Date()){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Week starts MONDAY. Returns the Monday (local) of the current week as YYYY-MM-DD.
function getWeekStartStr(){
  const d=new Date(), day=d.getDay();        // 0=Sun .. 6=Sat
  const diff=(day===0?-6:1-day);             // days back to Monday (Sun belongs to the week that began Mon)
  const monday=new Date(d); monday.setDate(d.getDate()+diff);
  return localDateStr(monday);
}

// The live chore list (Firestore-backed), falling back to the seed before first load.
function allChores(){ return (state.chores && state.chores.length) ? state.chores : CHORES_SEED; }
function getChores(t){ return allChores().filter(c=>c.person===t || c.person==='both'); }

// Classification by explicit `cat`:
//   daily      — every day
//   scheduled  — pinned to specific weekdays via days:[…] (0=Sun..6=Sat)
//   weekly     — anytime that week (persists until the Monday reset)
//   biweekly   — every other week (auto-alternating by parity); may also be day-pinned
//   nonneg     — must-do reminders: no allowance, excluded from payout
function hasDays(c){ return Array.isArray(c.days) && c.days.length>0; }
function occursOn(c, dayIdx){ return c.cat==='daily' ? true : (hasDays(c) ? c.days.includes(dayIdx) : false); }
function isPerDay(c){ return c.cat==='daily' || ((c.cat==='scheduled'||c.cat==='biweekly') && hasDays(c)); }
function isWeeklyStyle(c){ return c.cat==='weekly' || (c.cat==='biweekly' && !hasDays(c)); }

// Biweekly parity: whole weeks since an anchor Monday; active when (weekIndex % 2) matches parity.
function weekIndex(ws){ const E=Date.parse('2026-01-05T00:00:00'); return Math.round((Date.parse(ws+'T00:00:00')-E)/(7*864e5)); }
function activeThisWeek(c, ws){ return c.cat!=='biweekly' ? true : ((((weekIndex(ws)%2)+2)%2)===(c.parity||0)); }

// School-year gate: school:true chores only count/show when the global toggle is on.
function schoolOk(c){ return !c.school || state.schoolYear; }

// Week-aware buckets for a kid (off-week biweeklies and non-negotiables excluded from the first two).
function perDayChores(t, ws){ return getChores(t).filter(c=>c.cat!=='nonneg' && isPerDay(c) && activeThisWeek(c, ws) && schoolOk(c)); }
function weeklyChores(t, ws){ return getChores(t).filter(c=>isWeeklyStyle(c) && activeThisWeek(c, ws) && schoolOk(c)); }
function nonNegChores(t){ return getChores(t).filter(c=>c.cat==='nonneg'); }

// Person-aware badge for the kid views.
function choreBadge(c, t){
  if(c.school) return `<span class="badge b-school">school year</span>`;
  if(c.person==='both') return `<span class="badge b-shared">shared</span>`;
  return `<span class="badge ${t==='a'?'b-a':'b-b'}">${t==='a'?'Addison only':'Bryson only'}</span>`;
}

// The 7 local date strings (Mon..Sun) for a given week-start date string.
function weekDates(weekStartStr){
  const start=new Date(weekStartStr+'T00:00:00');
  return Array.from({length:7},(_,i)=>{ const d=new Date(start); d.setDate(start.getDate()+i); return localDateStr(d); });
}

// "Jun 14 – Jun 20" for a given week-start date string. Used on both kid tabs and parent report.
function weekRangeStr(weekStartStr){
  const start=new Date(weekStartStr+'T00:00:00');
  const end=new Date(start); end.setDate(end.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(start)} – ${fmt(end)}`;
}

function freshKidState(t){
  return {done:{},daily:{},claimed:{},grade:null,allowance:KIDS[t].allowance,weekStart:getWeekStartStr()};
}

let state = {
  a: freshKidState('a'),
  b: freshKidState('b'),
  projects: { a:{}, b:{} },   // persistent one-time project claims — stored in meta doc, NOT reset weekly
  chores: [],                 // live editable chore list — stored in homebase/chores, seeded from CHORES_SEED
  editMode: false,            // Master tab edit toggle (UI only, not persisted)
  editForm: null,             // in-progress add/edit chore form (UI only)
  schoolYear: true,           // global toggle — when false, school:true chores are hidden from daily lists (stored in meta)
  alertDismissed: false,
  lastSync: null
};

let currentView = 'a';
let unsubA = null, unsubB = null, unsubMeta = null, unsubChores = null;

// ─── FIREBASE SYNC ────────────────────────────────────────────────────────────

function setSyncStatus(status){
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (status==='live'?' live':status==='err'?' err':'');
  dot.title = status==='live'?'Live — syncing':'Sync error';
}

function getWeekDoc(t){
  const weekKey = getWeekStartStr();
  return window._doc(window._db, 'homebase', `${t}_${weekKey}`);
}
function getMetaDoc(){
  return window._doc(window._db, 'homebase', 'meta');
}
function getChoresDoc(){
  return window._doc(window._db, 'homebase', 'chores');
}

async function pushChores(){
  try {
    await window._setDoc(getChoresDoc(), { list: state.chores, updatedAt: window._serverTimestamp() });
    setSyncStatus('live');
  } catch(e){ console.error('Chores write error', e); setSyncStatus('err'); }
}

async function pushState(t){
  try {
    const s = state[t];
    await window._setDoc(getWeekDoc(t), {
      done: s.done,
      daily: s.daily || {},
      claimed: s.claimed,
      grade: s.grade || null,
      allowance: s.allowance,
      weekStart: s.weekStart,
      updatedAt: window._serverTimestamp()
    });
    setSyncStatus('live');
    state.lastSync = new Date();
  } catch(e){
    console.error('Firestore write error', e);
    setSyncStatus('err');
  }
}

async function pushMeta(){
  try {
    await window._setDoc(getMetaDoc(), {
      alertDismissed: state.alertDismissed,
      projects: state.projects,
      schoolYear: state.schoolYear,
      updatedAt: window._serverTimestamp()
    }, {merge:true});
  } catch(e){ console.error('Meta write error', e); }
}

function subscribeToFirestore(){
  // Subscribe to each kid's week doc
  ['a','b'].forEach(t => {
    const unsub = window._onSnapshot(getWeekDoc(t), snap => {
      if(snap.exists()){
        const data = snap.data();
        // Auto-reset if new week
        if(data.weekStart && data.weekStart !== getWeekStartStr()){
          state[t] = freshKidState(t);
          pushState(t);
        } else {
          state[t] = {
            done: data.done || {},
            daily: data.daily || {},
            claimed: data.claimed || {},
            grade: data.grade || null,
            allowance: data.allowance || KIDS[t].allowance,
            weekStart: data.weekStart || getWeekStartStr()
          };
        }
      } else {
        // First run — push fresh state
        state[t] = freshKidState(t);
        pushState(t);
      }
      setSyncStatus('live');
      if(currentView===t) renderKid(t);
      if(currentView==='p') renderParent();
    }, err => { console.error(err); setSyncStatus('err'); });
    if(t==='a') unsubA=unsub; else unsubB=unsub;
  });

  // Subscribe to meta (alert flag + persistent one-time project claims)
  unsubMeta = window._onSnapshot(getMetaDoc(), snap => {
    if(snap.exists()){
      const data = snap.data();
      state.alertDismissed = data.alertDismissed || false;
      state.schoolYear = data.schoolYear !== false;   // default ON unless explicitly turned off
      state.projects = data.projects || {a:{},b:{}};
      if(!state.projects.a) state.projects.a={};
      if(!state.projects.b) state.projects.b={};
    }
    checkAlerts();
    if(currentView==='p') renderParent();
    else if(currentView==='m') renderMaster();
    else renderKid(currentView);
  });

  // Subscribe to the editable chore list — seed from CHORES_SEED on first run.
  unsubChores = window._onSnapshot(getChoresDoc(), snap => {
    if(snap.exists() && Array.isArray(snap.data().list) && snap.data().list.length){
      // Drop any entry with a malformed id (defends inline onclick handlers against tampered docs).
      state.chores = snap.data().list.filter(c=>c && validChoreId(c.id));
    } else {
      state.chores = CHORES_SEED.map(c=>({...c}));
      pushChores();
    }
    if(currentView==='p') renderParent();
    else if(currentView==='m') renderMaster();
    else renderKid(currentView);
  }, err => { console.error(err); setSyncStatus('err'); });
}

// ─── COMPUTED ─────────────────────────────────────────────────────────────────

function getStats(t){
  const s = state[t];
  const weekly = weeklyChores(t, s.weekStart);
  const perDay = perDayChores(t, s.weekStart);
  const nonNeg = nonNegChores(t);
  const dates  = weekDates(s.weekStart);
  const today  = localDateStr();
  const todayIdx = new Date().getDay();

  // Weekly chores — persist until the Monday reset.
  const weeklyDone  = weekly.filter(c=>s.done[c.id]).length;
  const weeklyTotal = weekly.length;

  // Per-day chores — counted by actual occurrences this week (every-day = 7, day-pinned = its days).
  let dailyDone = 0, dailyPossible = 0;
  dates.forEach(date=>{
    const dayIdx = new Date(date+'T00:00:00').getDay();
    const dmap = (s.daily && s.daily[date]) || {};
    perDay.forEach(c=>{ if(occursOn(c, dayIdx)){ dailyPossible++; if(dmap[c.id]) dailyDone++; } });
  });

  // Today's snapshot — only the per-day chores that occur today.
  const todayChores = perDay.filter(c=>occursOn(c, todayIdx));
  const todayMap   = (s.daily && s.daily[today]) || {};
  const todayDone  = todayChores.filter(c=>todayMap[c.id]).length;
  const todayTotal = todayChores.length;

  // Non-negotiables — must-do reminders, NOT counted toward allowance.
  const nonNegDone  = nonNeg.filter(c=>s.done[c.id]).length;
  const nonNegTotal = nonNeg.length;

  // Combined pool drives allowance: per-day occurrences + weekly chores (non-negotiables excluded).
  const totalDone     = weeklyDone + dailyDone;
  const totalPossible = weeklyTotal + dailyPossible;
  const pct = totalPossible>0 ? totalDone/totalPossible : 0;
  const allowance = s.allowance || KIDS[t].allowance;
  const allowEarned = Math.round(pct*allowance);
  // Weekly extras live in the per-week doc (reset every week); one-time projects live in meta (persistent).
  const projClaims = state.projects[t] || {};
  const claimedList = [
    ...extrasFor(t).filter(e=>s.claimed[e.id]),
    ...PROJECTS.filter(e=>projClaims[e.id])
  ];
  const extrasEarned = claimedList.reduce((sum,e)=>sum+e.amt,0);
  const tier = GRADE_TIERS.find(g=>g.gpa===s.grade);
  const gradeBonus = (tier&&!tier.floor)?tier.amt:0;
  const totalExtras = extrasEarned+gradeBonus;
  return {weeklyDone,weeklyTotal,dailyDone,dailyPossible,todayDone,todayTotal,nonNegDone,nonNegTotal,
          totalDone,totalPossible,pct,allowEarned,extrasEarned,gradeBonus,totalExtras,claimedList,allowance};
}

// ─── RENDER KID ───────────────────────────────────────────────────────────────

function chkSVG(){ return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }

function renderKid(t){
  const isA = t==='a';
  const s = state[t];
  const stats = getStats(t);
  const valC = isA?'val-purple':'val-teal';
  const pfC  = isA?'pf-a':'pf-b';
  const chkC = isA?'chk-a':'chk-b';
  const amtC = isA?'ea-a':'ea-b';
  const selC = isA?'sel-a':'sel-b';

  const allowVal = s.allowance||KIDS[t].allowance;

  const todayPct  = stats.todayTotal>0  ? Math.round(stats.todayDone/stats.todayTotal*100)   : 0;
  const weeklyPct = stats.weeklyTotal>0 ? Math.round(stats.weeklyDone/stats.weeklyTotal*100) : 0;
  const todayLabel = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  let h = `
  <div class="main">
  <div class="summary-grid">
    <div class="summary-card">
      <div class="s-label">Today's chores</div>
      <div class="s-value ${valC}">${stats.todayDone}<span style="font-size:16px;font-weight:400;color:var(--text3)">/${stats.todayTotal}</span></div>
      <div class="s-sub">${todayLabel}</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Allowance earned</div>
      <div class="s-value ${valC}">$${stats.allowEarned}</div>
      <div class="s-sub">of $<input type="number" value="${allowVal}" min="0" step="1" style="width:44px;font-size:11px;border:1px solid var(--border);border-radius:4px;padding:1px 3px;color:var(--text2);background:var(--bg);" onchange="updateAllowance('${t}',this.value)"> max</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Extras earned</div>
      <div class="s-value ${valC}">$${stats.totalExtras}</div>
      <div class="s-sub">this week</div>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-labels"><span>Today's daily chores</span><span>${stats.todayDone} of ${stats.todayTotal} done</span></div>
    <div class="prog-track"><div class="prog-fill ${pfC}" style="width:${todayPct}%"></div></div>
    <div class="prog-labels" style="margin-top:12px;"><span>Weekly chores<span style="color:var(--text3);font-weight:400;"> · Week of ${weekRangeStr(s.weekStart)}</span></span><span>${stats.weeklyDone} of ${stats.weeklyTotal} done</span></div>
    <div class="prog-track"><div class="prog-fill ${pfC}" style="width:${weeklyPct}%"></div></div>
  </div>`;

  // Today's chores — per-day list (every-day + day-pinned chores), resets daily, tracked per calendar date
  const today = localDateStr();
  const todayIdx = new Date().getDay();
  const todayMap = (s.daily && s.daily[today]) || {};
  const todayChores = perDayChores(t, s.weekStart).filter(c=>occursOn(c, todayIdx));
  h += `<div class="section"><div class="sec-head"><span>Today's chores · ${todayLabel}</span><span>${stats.todayDone}/${stats.todayTotal}</span></div>`;
  if(todayChores.length===0){
    h+=`<div class="chore-row" style="cursor:default;"><span class="c-name" style="color:var(--text3);font-style:italic;">No chores scheduled for today.</span></div>`;
  }
  todayChores.forEach(c=>{
    const done=!!todayMap[c.id];
    h+=`<div class="chore-row${done?' done':''}" onclick="toggleDaily('${t}','${c.id}')">
      <div class="c-check ${done?chkC:''}">${done?chkSVG():''}</div>
      <span class="c-name">${esc(c.text)}${choreBadge(c,t)}</span>
      <span class="c-freq">${esc(c.freq)}</span>
    </div>`;
  });
  h+=`</div>`;

  // Non-negotiables — must-do reminders, no allowance (checkable, but excluded from payout)
  const nn = nonNegChores(t);
  if(nn.length){
    h += `<div class="section"><div class="sec-head"><span>Non-negotiables · no allowance</span><span>${stats.nonNegDone}/${stats.nonNegTotal}</span></div>`;
    nn.forEach(c=>{
      const done=!!s.done[c.id];
      h+=`<div class="chore-row${done?' done':''}" onclick="toggleChore('${t}','${c.id}')">
        <div class="c-check ${done?chkC:''}">${done?chkSVG():''}</div>
        <span class="c-name">${esc(c.text)}<span class="badge b-must">must do</span></span>
        <span class="c-freq">${esc(c.freq)}</span>
      </div>`;
    });
    h+=`</div>`;
  }

  // Weekly chores — persist (stay checked) until the Monday reset
  h += `<div class="section"><div class="sec-head"><span>Weekly chores</span><span>${stats.weeklyDone}/${stats.weeklyTotal}</span></div>`;
  weeklyChores(t, s.weekStart).forEach(c=>{
    const done=!!s.done[c.id];
    h+=`<div class="chore-row${done?' done':''}" onclick="toggleChore('${t}','${c.id}')">
      <div class="c-check ${done?chkC:''}">${done?chkSVG():''}</div>
      <span class="c-name">${esc(c.text)}${choreBadge(c,t)}</span>
      <span class="c-freq">${esc(c.freq)}</span>
    </div>`;
  });
  h+=`</div>`;

  // Extras — Household
  const houseItems = [...EXTRAS_SHARED.filter(e=>e.cat==='house'), ...(isA?EXTRAS_A:EXTRAS_B)];
  h+=`<div class="section"><div class="sec-head"><span>Extra earnings — household</span></div>`;
  houseItems.forEach(e=>{
    const done=!!s.claimed[e.id];
    h+=`<div class="extra-row${done?' done':''}" onclick="toggleExtra('${t}','${e.id}')">
      <div class="c-check ${done?chkC:''}">${done?chkSVG():''}</div>
      <span class="c-name">${e.text}</span>
      <span class="e-amt ${amtC}">+$${e.amt}</span>
    </div>`;
  });
  h+=`</div>`;

  // Extras — Learning
  const learnItems = EXTRAS_SHARED.filter(e=>e.cat==='learning');
  h+=`<div class="section"><div class="sec-head"><span>Extra earnings — learning</span></div>`;
  learnItems.forEach(e=>{
    const done=!!s.claimed[e.id];
    h+=`<div class="extra-row${done?' done':''}" onclick="toggleExtra('${t}','${e.id}')">
      <div class="c-check ${done?chkC:''}">${done?chkSVG():''}</div>
      <span class="c-name">${e.text}</span>
      <span class="e-amt ${amtC}">+$${e.amt}</span>
    </div>`;
  });

  // Grade card
  h+=`<div class="grade-card">
    <div class="grade-head"><span class="grade-title">Quarterly grade bonus</span><span class="grade-sub">Tap your GPA to claim</span></div>
    <div class="grade-tiers">`;
  GRADE_TIERS.forEach(g=>{
    const isActive=s.grade===g.gpa;
    const tc=g.floor?'g-tier floor':`g-tier${isActive?' '+selC:''}`;
    const ac=isActive&&!g.floor?`g-amt ${selC}`:'g-amt';
    h+=`<div class="${tc}" onclick="${g.floor?'':` selectGrade('${t}','${g.gpa}')`}">
      <div class="g-gpa">${g.label}</div>
      <div class="${ac}">${g.floor?'baseline':'+$'+g.amt}</div>
    </div>`;
  });
  h+=`</div></div></div>`;

  // Special Projects
  h+=`<div class="section"><div class="sec-head"><span>Special projects</span></div>`;
  PROJECTS.forEach(e=>{
    const done=!!(state.projects[t]||{})[e.id];
    h+=`<div class="extra-row${done?' done':''}" onclick="toggleProject('${t}','${e.id}')">
      <div class="c-check ${done?chkC:''}">${done?chkSVG():''}</div>
      <span class="c-name">${e.text} <span class="badge b-onetime">one-time</span></span>
      <span class="e-amt ${amtC}">+$${e.amt}</span>
    </div>`;
  });
  h+=`</div>`;

  if(state.lastSync){
    h+=`<div class="last-sync">Last synced ${state.lastSync.toLocaleTimeString()}</div>`;
  }
  h+=`</div>`;

  document.getElementById('view-'+t).innerHTML=h;
}

// ─── RENDER PARENT ────────────────────────────────────────────────────────────

// 7-day grid (Mon..Sun) of a kid's daily chores. Today's column is highlighted.
function dailyGridHTML(t){
  const s=state[t], kid=KIDS[t];
  const perDay=perDayChores(t, s.weekStart);
  const dates=weekDates(s.weekStart);
  const idxs=dates.map(d=>new Date(d+'T00:00:00').getDay());
  const today=localDateStr();
  const labels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const cc=t==='a'?'purple':'teal';

  let h=`<div class="p-summary"><h3 class="${cc}">${kid.name}'s daily chores — by day</h3>`;
  h+=`<div class="daygrid-scroll"><table class="daygrid"><thead><tr><th class="cname"></th>`;
  labels.forEach((lab,i)=>{ h+=`<th class="${dates[i]===today?'today':''}">${lab}</th>`; });
  h+=`<th class="ctot">✓</th></tr></thead><tbody>`;

  // One row per chore — cells only on the days it occurs (off-days left blank).
  perDay.forEach(c=>{
    h+=`<tr><td class="cname" title="${esc(c.text)}">${esc(c.text)}</td>`;
    let done=0, poss=0;
    dates.forEach((date,i)=>{
      let cell='';
      if(occursOn(c, idxs[i])){
        poss++;
        const ok=!!((s.daily&&s.daily[date])||{})[c.id];
        if(ok) done++;
        cell=`<span class="${ok?'cell-done':'cell-miss'}">${ok?'✓':'·'}</span>`;
      }
      h+=`<td class="${date===today?'today':''}">${cell}</td>`;
    });
    h+=`<td class="ctot">${done}/${poss}</td></tr>`;
  });

  // Per-day totals (occurrences completed each day)
  let grandDone=0, grandPoss=0;
  h+=`<tr class="dg-total"><td class="cname">Daily total</td>`;
  dates.forEach((date,i)=>{
    const dmap=(s.daily&&s.daily[date])||{};
    let dd=0;
    perDay.forEach(c=>{ if(occursOn(c, idxs[i])){ grandPoss++; if(dmap[c.id]){ dd++; grandDone++; } } });
    h+=`<td class="${date===today?'today ':''}ctot">${dd}</td>`;
  });
  h+=`<td class="ctot">${grandDone}/${grandPoss}</td></tr>`;
  h+=`</tbody></table></div></div>`;
  return h;
}

  const sA=getStats('a'), sB=getStats('b');
  const totalPayout=sA.allowEarned+sA.totalExtras+sB.allowEarned+sB.totalExtras;

  let h=`<div class="main">`;
  h+=`<div style="font-size:13px;color:var(--text3);margin-bottom:1rem;">Week of ${weekRangeStr(state.a.weekStart)}</div>`;
  h+=`<div class="payout-bar"><span class="pt-label">&#128181; Total family payout this week</span><span class="pt-val">$${totalPayout}</span></div>`;

  // Kid summary cards
  h+=`<div class="p-grid">`;
  ['a','b'].forEach(t=>{
    const stats=getStats(t);
    const kid=KIDS[t];
    const pct=Math.round(stats.pct*100);
    const cc=t==='a'?'purple':'teal';
    const pfc=t==='a'?'pf-a':'pf-b';
    const pctC=pct>=80?'good':pct>=50?'warn':'';
    h+=`<div class="p-card">
      <div class="p-card-head">
        <div class="p-card-name ${cc}">${kid.name}, ${kid.age}</div>
        <div class="p-card-sub">Allowance up to $${stats.allowance}/week</div>
      </div>
      <div class="p-card-body">
        <div class="p-row"><span class="pl">Daily chores (this wk)</span><span class="pv">${stats.dailyDone}/${stats.dailyPossible}</span></div>
        <div class="p-row"><span class="pl">Weekly chores</span><span class="pv ${pctC}">${stats.weeklyDone}/${stats.weeklyTotal}</span></div>
        ${stats.nonNegTotal?`<div class="p-row"><span class="pl">Non-negotiables</span><span class="pv">${stats.nonNegDone}/${stats.nonNegTotal} <span style="color:var(--text3);font-weight:400;">no $</span></span></div>`:''}
        <div class="p-row"><span class="pl">Allowance earned</span><span class="pv ${cc}">$${stats.allowEarned}</span></div>
        <div class="p-row"><span class="pl">Extra chores</span><span class="pv ${cc}">$${stats.extrasEarned}</span></div>
        <div class="p-row"><span class="pl">Grade bonus</span><span class="pv ${cc}">${stats.gradeBonus>0?'$'+stats.gradeBonus:'—'}</span></div>
        <div class="p-row" style="border:none"><span class="pl" style="font-weight:600">Total owed</span><span class="pv ${cc}" style="font-size:16px">$${stats.allowEarned+stats.totalExtras}</span></div>
        <div class="mini-prog"><div class="mini-fill ${pfc}" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Daily chore grids — day-by-day (Mon..Sun) per kid
  h+=dailyGridHTML('a');
  h+=dailyGridHTML('b');

  // Extras breakdown
  h+=`<div class="p-grid">`;
  ['a','b'].forEach(t=>{
    const stats=getStats(t);
    const kid=KIDS[t];
    const s=state[t];
    h+=`<div class="p-summary"><h3>${kid.name}'s extras & projects</h3>`;
    if(stats.claimedList.length===0&&stats.gradeBonus===0){
      h+=`<div class="no-extras">Nothing claimed yet.</div>`;
    } else {
      h+=`<div class="e-list">`;
      stats.claimedList.forEach(e=>{
        h+=`<div class="e-item"><span>${e.text}</span><span class="eamt">+$${e.amt}</span></div>`;
      });
      if(stats.gradeBonus>0){
        const tier=GRADE_TIERS.find(g=>g.gpa===s.grade);
        h+=`<div class="e-item"><span>Grade bonus (GPA ${tier.label})</span><span class="eamt">+$${stats.gradeBonus}</span></div>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;

  // Outstanding chores
  h+=`<div class="p-grid">`;
  ['a','b'].forEach(t=>{
    const s=state[t];
    const kid=KIDS[t];
    const outstanding=weeklyChores(t, s.weekStart).filter(c=>!s.done[c.id]);
    h+=`<div class="p-summary"><h3>${kid.name}'s outstanding weekly chores</h3>`;
    if(outstanding.length===0){
      h+=`<div class="no-extras">All weekly chores done! &#127881;</div>`;
    } else {
      h+=`<div class="e-list">`;
      outstanding.forEach(c=>{
        h+=`<div class="e-item"><span>${esc(c.text)}</span><span style="font-size:11px;color:var(--text3)">${esc(c.freq)}</span></div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;

  // Controls
  h+=`<div class="divider"></div>
  <div class="sec-head" style="margin-bottom:1rem;">Parent controls</div>
  <div class="btn-row">
    <button class="btn btn-notif" onclick="requestNotif()">&#128276; Enable reminders</button>
    <button class="btn btn-danger" onclick="resetKid('a')">Reset Addison's week</button>
    <button class="btn btn-danger" onclick="resetKid('b')">Reset Bryson's week</button>
    <button class="btn btn-danger" onclick="resetAll()">Reset full week</button>
  </div>`;

  if(state.lastSync){
    h+=`<div class="last-sync">Last synced with Firebase: ${state.lastSync.toLocaleTimeString()}</div>`;
  }
  h+=`</div>`;

  document.getElementById('view-p').innerHTML=h;
}

// ─── RENDER MASTER LIST ───────────────────────────────────────────────────────
// The running chore list, grouped by category and tagged by person. Reads from the
// live (Firestore-backed) list and is editable in place via Edit mode.

const MASTER_GROUPS = [
  {key:'daily',     label:'Daily — every day'},
  {key:'scheduled', label:'Scheduled — specific days'},
  {key:'biweekly',  label:'Biweekly — every other week'},
  {key:'weekly',    label:'Weekly — anytime that week'},
  {key:'nonneg',    label:'Non-negotiables — must do, no allowance'},
];
const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function whoBadge(person){
  return person==='a' ? `<span class="badge b-a">Addison</span>`
       : person==='b' ? `<span class="badge b-b">Bryson</span>`
       :                `<span class="badge b-shared">Both</span>`;
}

// Readable recurrence label — uses the stored freq, else derives from cat + days.
function choreFreqLabel(c){
  if(c.freq) return c.freq;
  const days = hasDays(c) ? c.days.map(d=>DAY_LABELS[d]).join(' & ') : '';
  if(c.cat==='daily')     return 'Daily';
  if(c.cat==='weekly')    return 'Weekly';
  if(c.cat==='nonneg')    return 'Must do';
  if(c.cat==='scheduled') return days || 'Scheduled';
  if(c.cat==='biweekly')  return 'Every other wk' + (days ? ' · '+days : '');
  return '';
}

function renderMaster(){
  const all = allChores();
  const ws  = getWeekStartStr();
  const edit = state.editMode;

  let h=`<div class="main">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:1rem;">
    <div style="font-size:13px;color:var(--text3);">Every chore, tagged by person and recurrence.${edit?' <strong style="color:var(--purple-dark);">Editing — changes sync to all devices.</strong>':''}</div>
    <button class="btn${edit?' btn-notif':''}" style="flex-shrink:0;" onclick="toggleEditMode()">${edit?'Done':'&#9998; Edit'}</button>
  </div>`;

  // School-year toggle — hides/shows all school:true chores in the kids' daily lists.
  const sy=state.schoolYear;
  h+=`<div class="p-summary" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:.85rem 1.1rem;">
    <span style="font-size:14px;font-weight:500;">&#127891; School-year chores</span>
    <button class="btn${sy?' btn-notif':''}" style="padding:5px 14px;flex-shrink:0;" onclick="toggleSchoolYear()">${sy?'On':'Off'}</button>
    <span style="font-size:12px;color:var(--text3);">${sy?'showing in daily lists':'hidden from daily lists (summer mode)'}</span>
  </div>`;

  if(edit){
    h+=`<div class="btn-row" style="margin-bottom:1rem;"><button class="btn btn-notif" onclick="startAddChore()">&#43; Add chore</button></div>`;
    if(state.editForm) h+=choreFormHTML();
  }

  let count=0;
  MASTER_GROUPS.forEach(g=>{
    const items=all.filter(c=>c.cat===g.key);
    if(!items.length) return;
    h+=`<div class="section"><div class="sec-head"><span>${g.label}</span><span>${items.length}</span></div>`;
    items.forEach(c=>{
      count++;
      const note = c.cat==='biweekly'
        ? ` <span style="color:var(--text3);font-size:11px;">(${activeThisWeek(c,ws)?'active this wk':'off this wk'})</span>` : '';
      const hiddenBySchool = c.school && !sy;
      const school = c.school ? ` <span class="badge b-school">school</span>${hiddenBySchool?' <span style="color:var(--text3);font-size:11px;">(hidden)</span>':''}` : '';
      const right = edit
        ? `<span style="display:flex;gap:6px;flex-shrink:0;">
             <button class="btn" style="padding:4px 10px;font-size:12px;" onclick="startEditChore('${c.id}')">Edit</button>
             <button class="btn btn-danger" style="padding:4px 10px;font-size:12px;" onclick="deleteChore('${c.id}')">Delete</button>
           </span>`
        : `<span class="c-freq">${esc(choreFreqLabel(c))}</span>`;
      h+=`<div class="chore-row" style="cursor:default;${hiddenBySchool?'opacity:.5;':''}">
        <span class="c-name">${esc(c.text)} ${whoBadge(c.person)}${school}${note}</span>
        ${right}
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`<div style="font-size:12px;color:var(--text3);margin-top:.5rem;">${count} chores total.</div>`;
  h+=`</div>`;
  document.getElementById('view-m').innerHTML=h;
}

// Inline add/edit form. Values are read from the DOM on save (so typing never re-renders).
function choreFormHTML(){
  const f=state.editForm;
  const ws=getWeekStartStr();
  const sel=(v,want)=>String(v)===String(want)?'selected':'';
  const showDays=(f.cat==='scheduled'||f.cat==='biweekly');
  const showPar=(f.cat==='biweekly');
  const dayBoxes=DAY_LABELS.map((lab,i)=>
    `<label style="display:inline-flex;align-items:center;gap:3px;font-size:12px;margin:0 10px 6px 0;"><input type="checkbox" class="cf-day" value="${i}" ${f.days&&f.days.includes(i)?'checked':''}> ${lab}</label>`).join('');
  const thisWeekParity = (((weekIndex(ws)%2)+2)%2)===0 ? 'A' : 'B';
  return `<div class="p-summary" style="border:1px solid var(--purple-border);">
    <h3 class="purple">${f.id?'Edit chore':'Add chore'}</h3>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <label class="cf-lbl">Chore name<br><input id="cf-text" type="text" value="${esc(f.text)}" placeholder="e.g. Take out recycling" class="cf-in"></label>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <label class="cf-lbl" style="flex:1;min-width:130px;">Person<br><select id="cf-person" class="cf-in">
          <option value="both" ${sel(f.person,'both')}>Both</option>
          <option value="a" ${sel(f.person,'a')}>Addison</option>
          <option value="b" ${sel(f.person,'b')}>Bryson</option>
        </select></label>
        <label class="cf-lbl" style="flex:1;min-width:130px;">Category<br><select id="cf-cat" class="cf-in" onchange="onCatChange()">
          <option value="daily" ${sel(f.cat,'daily')}>Daily — every day</option>
          <option value="scheduled" ${sel(f.cat,'scheduled')}>Scheduled — specific days</option>
          <option value="weekly" ${sel(f.cat,'weekly')}>Weekly — anytime</option>
          <option value="biweekly" ${sel(f.cat,'biweekly')}>Biweekly — every other wk</option>
          <option value="nonneg" ${sel(f.cat,'nonneg')}>Non-negotiable — no $</option>
        </select></label>
      </div>
      <div id="cf-days-row" class="cf-lbl" style="display:${showDays?'block':'none'};">Days<br>${dayBoxes}</div>
      <div id="cf-parity-row" class="cf-lbl" style="display:${showPar?'block':'none'};">Which week<br>
        <select id="cf-parity" class="cf-in" style="max-width:140px;display:inline-block;">
          <option value="0" ${sel(f.parity??0,0)}>Week A</option>
          <option value="1" ${sel(f.parity??0,1)}>Week B</option>
        </select>
        <span style="color:var(--text3);font-size:12px;"> — this week (${weekRangeStr(ws)}) is Week ${thisWeekParity}. Flip if it lands wrong.</span>
      </div>
      <label class="cf-lbl" style="display:flex;align-items:center;gap:6px;"><input id="cf-school" type="checkbox" ${f.school?'checked':''}> School-year only</label>
      <div class="btn-row">
        <button class="btn btn-notif" onclick="saveChore()">Save</button>
        <button class="btn" onclick="cancelChore()">Cancel</button>
      </div>
    </div>
  </div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────

function toggleChore(t,id){
  state[t].done[id]=!state[t].done[id];
  renderKid(t);
  pushState(t);
}

// Daily chores are stored per calendar date, so each day starts fresh and history is kept for the week's grid.
function toggleDaily(t,id){
  const today=localDateStr();
  if(!state[t].daily) state[t].daily={};
  if(!state[t].daily[today]) state[t].daily[today]={};
  state[t].daily[today][id]=!state[t].daily[today][id];
  renderKid(t);
  pushState(t);
}

function toggleExtra(t,id){
  state[t].claimed[id]=!state[t].claimed[id];
  renderKid(t);
  pushState(t);
}

function toggleProject(t,id){
  if(!state.projects[t]) state.projects[t]={};
  state.projects[t][id]=!state.projects[t][id];
  if(currentView==='p') renderParent(); else renderKid(t);
  pushMeta();   // projects persist in meta — survive the weekly reset
}

function selectGrade(t,gpa){
  state[t].grade=state[t].grade===gpa?null:gpa;
  renderKid(t);
  pushState(t);
}

function updateAllowance(t,val){
  state[t].allowance=parseInt(val)||KIDS[t].allowance;
  renderKid(t);
  pushState(t);
}

function resetKid(t){
  if(!confirm(`Reset ${KIDS[t].name}'s week? This clears all checked items.`)) return;
  state[t]=freshKidState(t);
  pushState(t);
  if(currentView===t) renderKid(t);
  else renderParent();
}

function resetAll(){
  if(!confirm('Reset the full week for both kids?')) return;
  ['a','b'].forEach(t=>{ state[t]=freshKidState(t); pushState(t); });
  state.alertDismissed=false;
  pushMeta();
  renderParent();
}

function dismissAlert(){
  state.alertDismissed=true;
  pushMeta();
  document.getElementById('alert-bar').classList.add('hidden');
}

// ─── CHORE EDITING (Master tab) ───────────────────────────────────────────────

function newChoreId(){ return 'c' + Date.now().toString(36) + Math.floor(Math.random()*46656).toString(36); }

function toggleEditMode(){ state.editMode=!state.editMode; if(!state.editMode) state.editForm=null; renderMaster(); }

// Global school-year switch — persisted in meta so it syncs to every device.
function toggleSchoolYear(){ state.schoolYear=!state.schoolYear; pushMeta(); renderMaster(); }

function startAddChore(){
  state.editForm={ id:null, text:'', person:'both', cat:'daily', days:[], parity:0, school:false };
  renderMaster();
}

function startEditChore(id){
  const c=allChores().find(x=>x.id===id); if(!c) return;
  state.editForm={ id:c.id, text:c.text, person:c.person, cat:c.cat, days:(c.days||[]).slice(), parity:c.parity||0, school:!!c.school };
  renderMaster();
}

function cancelChore(){ state.editForm=null; renderMaster(); }

// Toggle the Days / Which-week rows without re-rendering (preserves form input focus).
function onCatChange(){
  const cat=document.getElementById('cf-cat').value;
  document.getElementById('cf-days-row').style.display=(cat==='scheduled'||cat==='biweekly')?'block':'none';
  document.getElementById('cf-parity-row').style.display=(cat==='biweekly')?'block':'none';
}

function saveChore(){
  const text=document.getElementById('cf-text').value.trim();
  if(!text){ alert('Give the chore a name.'); return; }
  const person=document.getElementById('cf-person').value;
  const cat=document.getElementById('cf-cat').value;
  const school=document.getElementById('cf-school').checked;
  let days=[...document.querySelectorAll('.cf-day:checked')].map(e=>parseInt(e.value)).sort((a,b)=>a-b);
  const parity=parseInt(document.getElementById('cf-parity').value)||0;
  if(cat!=='scheduled' && cat!=='biweekly') days=[];
  if(cat==='scheduled' && !days.length){ alert('Pick at least one day for a scheduled chore.'); return; }

  const rec={ id: state.editForm.id || newChoreId(), text, person, cat };
  if(!validChoreId(rec.id)){ alert('Invalid chore id — not saved.'); return; }
  if(school) rec.school=true;
  if(days.length) rec.days=days;
  if(cat==='biweekly') rec.parity=parity;
  rec.freq=choreFreqLabel(rec);   // store a readable label (derived from cat + days)

  // Make sure we're editing a real array (not the seed fallback) before mutating.
  if(!Array.isArray(state.chores) || !state.chores.length) state.chores=allChores().map(c=>({...c}));
  const i=state.chores.findIndex(c=>c.id===rec.id);
  if(i>=0) state.chores[i]=rec; else state.chores.push(rec);

  state.editForm=null;
  pushChores();
  renderMaster();
}

function deleteChore(id){
  const c=allChores().find(x=>x.id===id);
  if(!confirm(`Delete "${c?c.text:'this chore'}"? This removes it for both kids.`)) return;
  if(!Array.isArray(state.chores) || !state.chores.length) state.chores=allChores().map(c=>({...c}));
  state.chores=state.chores.filter(c=>c.id!==id);
  if(state.editForm && state.editForm.id===id) state.editForm=null;
  pushChores();
  renderMaster();
}

// ─── ALERTS ───────────────────────────────────────────────────────────────────

function checkAlerts(){
  const now=new Date(), day=now.getDay(), hour=now.getHours();
  const isSat=day===6&&hour>=8&&hour<20;
  const isSun=day===0&&hour>=8&&hour<18;
  if((isSat||isSun)&&!state.alertDismissed){
    const msg=isSat
      ?'<strong>Weekend catch-up!</strong> Two days left to finish this week\'s weekly chores.'
      :'<strong>Last day of the week!</strong> Finish any outstanding weekly chores today — resets Monday.';
    document.getElementById('alert-text').innerHTML=msg;
    document.getElementById('alert-bar').classList.remove('hidden');
    if(Notification&&Notification.permission==='granted'){
      new Notification('Homebase — Week Ending Soon',{
        body:isSat?'Check outstanding chores — week ends tomorrow!':'Last day! Remaining chores need to be done today.'
      });
    }
  } else {
    document.getElementById('alert-bar').classList.add('hidden');
  }
}

function requestNotif(){
  if(!('Notification' in window)){ alert('Notifications not supported on this device.'); return; }
  Notification.requestPermission().then(p=>{
    if(p==='granted') alert('Reminders enabled! You\'ll be notified Saturday and Sunday mornings.');
    else alert('Permission denied. Enable notifications in your browser settings.');
  });
}

// ─── NAV ──────────────────────────────────────────────────────────────────────

function showView(v){
  currentView=v;
  ['a','b','p','m'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===v?'':'none';
    const tab=document.getElementById('tab-'+x);
    tab.className='nav-tab'+(x===v?((x==='p'||x==='m')?' act-p':' act-'+x):'');
  });
  if(v==='p') renderParent();
  else if(v==='m') renderMaster();
  else renderKid(v);
}

// ─── CONNECTIVITY ─────────────────────────────────────────────────────────────

window.addEventListener('online',  ()=>document.getElementById('offline-bar').classList.remove('show'));
window.addEventListener('offline', ()=>document.getElementById('offline-bar').classList.add('show'));

// ─── BOOT ─────────────────────────────────────────────────────────────────────

document.addEventListener('firebase-ready', ()=>{
  setSyncStatus('live');
  subscribeToFirestore();
  setInterval(checkAlerts, 60*60*1000);
  showView('a');
});

// Fallback if Firebase config not yet filled in
setTimeout(()=>{
  if(!window._firebaseReady){
    setSyncStatus('err');
    document.querySelectorAll('.loading').forEach(el=>{
      el.innerHTML='<div style="color:var(--red-dark);font-size:14px;text-align:center;padding:2rem;">&#9888; Firebase not configured yet.<br><span style="font-size:12px;color:var(--text3)">Swap in your credentials in the &lt;script type="module"&gt; block at the top of the file.</span></div>';
    });
  }
}, 5000);
</script>

<!-- ─── FIREBASE SETUP GUIDE ───────────────────────────────────────────────────

STEP-BY-STEP: Getting this running on Firebase + Netlify
==========================================================

STEP 1 — Create a Firebase project (skip if adding to existing project)
  1. Go to https://console.firebase.google.com
  2. Click "Add project" → name it (e.g. "homebase") → Continue
  3. Disable Google Analytics if you don't need it → Create project

STEP 2 — Enable Firestore
  1. In your project, click "Firestore Database" in the left sidebar
  2. Click "Create database"
  3. Choose "Start in test mode" (we'll secure it next) → Next
  4. Pick your region (us-east1 or us-central1 recommended) → Enable

STEP 3 — Set Firestore security rules
  In Firestore → Rules tab, replace the default rules with:

  rules_version = '2';
  service cloud.firestore {
    match /databases/{database}/documents {
      match /homebase/{document=**} {
        allow read, write: if true;
      }
    }
  }

  Click Publish. (This is open access — the family URL is your only protection,
  which you chose. You can tighten this later if needed.)

STEP 4 — Register a web app and get your config
  1. In Firebase Console → Project Settings (gear icon) → Your apps
  2. Click the </> web icon → Register app → name it "homebase-web"
  3. Copy the firebaseConfig object shown — it looks like:
       const firebaseConfig = {
         apiKey: "AIza...",
         authDomain: "your-project.firebaseapp.com",
         projectId: "your-project",
         ...
       };
  4. Paste those values into the firebaseConfig object at the TOP of this file,
     replacing each "REPLACE_WITH_YOUR_..." placeholder.

STEP 5 — Deploy to Netlify
  Option A — Drag and drop (easiest):
    1. Go to https://app.netlify.com → "Add new site" → "Deploy manually"
    2. Drag this HTML file into the upload zone
    3. Netlify gives you a URL like https://random-name.netlify.app
    4. Rename the site in Site Settings → Site details → Site name

  Option B — GitHub (recommended if you already use this for your other apps):
    1. Put this file in a GitHub repo (name it index.html in the root)
    2. In Netlify → "Add new site" → "Import an existing project" → Connect to GitHub
    3. Select the repo → Deploy site
    4. Every push to main auto-deploys

STEP 6 — Share the URL
  Share the Netlify URL with your family. Bookmark it on each device.
  All state syncs in real time across every device via Firebase.

STEP 7 — Enable Saturday/Sunday reminders (optional, per device)
  Open the app → Parent Report → "Enable reminders" → Allow
  Each device that grants permission gets a browser notification
  Saturday morning and again Sunday morning when the week is ending.

That's it. The week runs Monday–Sunday and auto-resets every Monday (new Firestore
doc per week), so history is preserved — each week's data lives at homebase/a_YYYY-MM-DD
and homebase/b_YYYY-MM-DD (the date is that week's Monday) if you ever want to look back.
Daily chores reset every day (tracked per date inside the week doc); weekly chores stay
checked until the Monday reset.

──────────────────────────────────────────────────────────────────────────── -->
